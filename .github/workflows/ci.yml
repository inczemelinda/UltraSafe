name: ci 

on: 
  pull_request: 
  push: 
    branches: ["main"]

jobs: 
  test:
    name: Lint and test 
    runs-on: ubuntu-latest 

    services: 
      postgres: 
        image: postgres:16 
        env: 
          POSTGRES_DB: uw_test 
          POSTGRES_USER: uw 
          POSTGRES_PASSWORD: uw
        ports: 
          - 5432:5432 
        options: >- 
          --health-cmd "pg_isready -U uw -d uw_test"
          --health-interval 5s 
          --health-timeout 5s 
          --health-retries 10 
    env: 
      DATABASE_URL: postgresql://uw:uw@localhost:5432/uw_test
      ENVIRONMENT: test

    steps: 
      - name: Checkout 
        uses: actions/checkout@v4 

      - name: Install uv 
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Initialize test database
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          ./scripts/db_migrate.sh
          ./scripts/db_seed_demo.sh

      - name: Run tests
        run: uv run pytest

  docker-build: 
    name: Docker build 
    runs-on: ubuntu-latest
    needs: test 

    steps: 
      - name: Checkout 
        uses: actions/checkout@v4 

      - name: Build Docker Image 
        run: docker build -t underwright:${{github.sha}} .
